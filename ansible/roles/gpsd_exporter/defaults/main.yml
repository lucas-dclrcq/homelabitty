---
# brendanbank/gpsd-prometheus-exporter — a single Python script exporter.
gpsd_exporter_repo: brendanbank/gpsd-prometheus-exporter
gpsd_exporter_version: v1.1.19
gpsd_exporter_bin: /usr/local/bin/gpsd_exporter.py
gpsd_exporter_port: 9015

# Extra CLI options. --pps-histogram exposes the PPS jitter histogram used by
# the dashboard heatmap. Add --offset-from-geopoint --geopoint-lat/-lon to also
# track positional drift against a surveyed fixed point.
gpsd_exporter_options: "--pps-histogram"
