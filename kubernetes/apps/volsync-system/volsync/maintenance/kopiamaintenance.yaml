---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/kopiamaintenance_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  # Run as nobody (65534) to match the repository ownership: the VolSync backup
  # movers run privileged and get root-squashed to 65534 by TrueNAS NFS, so the
  # repo dirs are 65534:1500 / 0700. Maintenance must use the same uid.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 1500
    fsGroup: 1500
  trigger:
    schedule: 30 3,15 * * *
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/tank/Backup/kopia_backup
          server: "truenas.${INTERNAL_DOMAIN}"
  repository:
    repository: volsync-maintenance-secret
