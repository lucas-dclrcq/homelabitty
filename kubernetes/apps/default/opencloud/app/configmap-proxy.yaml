---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencloud-proxy-config
data:
  proxy.yaml: |
    role_assignment:
      driver: oidc
      oidc_role_mapper:
        role_claim: groups
        role_mapping:
          - role_name: admin
            claim_value: "Hoohoot Admins"
          - role_name: user
            claim_value: "Hoohoot Users"
