---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      opencloud:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          enableServiceLinks: false
          securityContext:
            runAsUser: ${APP_UID}
            runAsGroup: ${APP_GID}
            runAsNonRoot: true
            fsGroup: ${APP_GID}
            fsGroupChangePolicy: OnRootMismatch
        strategy: Recreate
        containers:
          app:
            image:
              repository: opencloudeu/opencloud-rolling
              tag: "7.1.0"
            command:
              - /bin/sh
            args:
              - -c
              - "opencloud init || true; opencloud server"
            env:
              OC_URL: "https://drive.${SECRET_DOMAIN}"
              OC_LOG_LEVEL: "info"
              OC_LOG_COLOR: "false"
              OC_LOG_PRETTY: "false"
              OC_INSECURE: "false"
              PROXY_TLS: "false"
              PROXY_HTTP_ADDR: "0.0.0.0:9200"
              PROXY_ENABLE_BASIC_AUTH: "false"
              IDM_CREATE_DEMO_USERS: "false"
              FRONTEND_ARCHIVER_MAX_SIZE: "10000000000"
              FRONTEND_CHECK_FOR_UPDATES: "false"
              # Expose NATS and gateway gRPC so the collaboration pod can reach them cross-pod
              NATS_NATS_HOST: "0.0.0.0"
              GATEWAY_GRPC_ADDR: "0.0.0.0:9142"
              # OIDC via Authentik; built-in IDM stays as user directory with auto-provisioning
              PROXY_AUTOPROVISION_ACCOUNTS: "true"
              PROXY_USER_OIDC_CLAIM: "preferred_username"
              PROXY_USER_CS3_CLAIM: "username"
              PROXY_OIDC_REWRITE_WELLKNOWN: "true"
              PROXY_OIDC_ACCESS_TOKEN_VERIFY_METHOD: "none"
              PROXY_OIDC_SKIP_VERIFICATION: "false"
              PROXY_ROLE_ASSIGNMENT_DRIVER: "default"
              GRAPH_ASSIGN_DEFAULT_USER_ROLE: "true"
              WEB_OIDC_SCOPE: "openid profile email groups"
              FRONTEND_APP_HANDLER_SECURE_VIEW_APP_ADDR: "eu.opencloud.api.collaboration"
            envFrom:
              - secretRef:
                  name: opencloud-secret
            probes:
              liveness: &ocProbes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9200
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *ocProbes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi

    service:
      opencloud:
        controller: opencloud
        ports:
          http:
            port: 9200
          nats:
            port: 9233
          gateway:
            port: 9142

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          opencloud:
            app:
              - path: /etc/opencloud
      data:
        type: nfs
        server: "truenas.${INTERNAL_DOMAIN}"
        path: /mnt/tank/Apps/opencloud/data
        advancedMounts:
          opencloud:
            app:
              - path: /var/lib/opencloud

    route:
      opencloud:
        hostnames:
          - "drive.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
        rules:
          - backendRefs:
              - name: opencloud
                port: 9200
