---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app oxicloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      oxicloud:
        containers:
          main:
            image:
              repository: docker.io/diocrafts/oxicloud
              tag: "0.5.5"
            command:
              - "/usr/local/bin/oxicloud"
            env:
              OXICLOUD_SERVER_HOST: "0.0.0.0"
              OXICLOUD_SERVER_PORT: "8086"
              OXICLOUD_STORAGE_PATH: /app/storage
              OXICLOUD_BASE_URL: "https://drive.${SECRET_DOMAIN}"
              MIMALLOC_PURGE_DELAY: "0"
            envFrom:
              - secretRef:
                  name: oxicloud-secret
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

    service:
      app:
        controller: oxicloud
        ports:
          http:
            port: 8086

    persistence:
      storage:
        type: nfs
        server: "truenas.${INTERNAL_DOMAIN}"
        path: /mnt/tank/Apps/oxicloud
        globalMounts:
          - path: /app/storage

    route:
      app:
        hostnames:
          - "drive.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: 8086
