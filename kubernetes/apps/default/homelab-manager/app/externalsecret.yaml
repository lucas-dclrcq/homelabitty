---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homelab-manager
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: homelab-manager-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # PG
        DB_REACTIVE_URL: '{{ index . "uri" }}'
        DB_JDBC_URL: '{{ index . "jdbc-uri" }}'
        DB_USERNAME: '{{ index . "user" }}'
        DB_PASSWORD: '{{ index . "password" }}'
        # Matrix Client
        SYNAPSE_BASE_URL: http://synapse-matrix-synapse.matrix.svc.cluster.local:8008
        MATRIX_ACCESS_TOKEN: "{{ .JOHNNY_BOT_ACCESS_TOKEN }}"
        MATRIX_ROOM_MEDIA: "{{ .MATRIX_ROOM_MEDIA }}"
        MATRIX_ROOM_MUSIC: "{{ .MATRIX_ROOM_MUSIC }}"
        MATRIX_ROOM_SUPPORT: "{{ .MATRIX_ROOM_SUPPORT }}"
        # Internal APIs
        SONARR_BASE_URL: http://sonarr.downloads.svc.cluster.local
        SONARR_API_KEY: "{{ .SONARR__AUTH__APIKEY }}"
        RADARR_BASE_URL: http://radarr.downloads.svc.cluster.local
        RADARR_API_KEY: "{{ .RADARR__AUTH__APIKEY }}"
        LIDARR_BASE_URL: http://lidarr.downloads.svc.cluster.local:8686
        LIDARR_API_KEY: "{{ .LIDARR__AUTH__APIKEY }}"
        JELLYSTAT_API_TOKEN: "{{ .JELLYSTAT_API_TOKEN }}"
        JELLYFIN_API_KEY: "{{ .JELLYFIN_API_KEY }}"
        JELLYSTAT_BASE_URL: http://jellystat.media.svc.cluster.local:3000
        JELLYFIN_BASE_URL: http://jellyfin.media.svc.cluster.local:8096
        # Matrix Bot
        MATRIX_BOT_ENABLED: "true"
        MATRIX_BOT_ADMINS: "@lucasd:${SECRET_DOMAIN}"
        MATRIX_BOT_BASE_URL: http://synapse-matrix-synapse.matrix.svc.cluster.local:8008
        MATRIX_BOT_DATA_DIRECTORY: /matrix
        MATRIX_BOT_PASSWORD: "{{ .MATRIX_BOT_PASSWORD }}"
        MATRIX_BOT_USERNAME: bot
        MATRIX_BOT_PREFIX: johnny
        MATRIX_BOT_USERS: "${SECRET_DOMAIN}"
        # GIPHY
        GIPHY_API_KEY: "{{ .GIPHY_API_KEY }}"
        # OTEL
        QUARKUS_OTEL_ENABLED: "true"
        QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy.observability.svc.cluster.local:4317
        QUARKUS_OTEL_SERVICE_NAME: homelab-manager
  dataFrom:
    - extract:
        key: common/matrix
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: default/homelab-manager/config
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: media/sonarr/config
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: downloads/radarr
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: downloads/lidarr
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: postgres-16-pguser-homelabmanager
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: crunchy-pgo-secrets
