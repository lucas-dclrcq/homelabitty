---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app firefly-importer
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      firefly-importer:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/fireflyiii/data-importer
              tag: version-2.3.2

            env:
              APP_ENV: production
              APP_DEBUG: "false"
              APP_URL: "https://firefly-importer.${LIMITED_DOMAIN}"
              TZ: "${TIMEZONE}"
              TRUSTED_PROXIES: "**"
              LOG_CHANNEL: stack
              FIREFLY_III_URL: "http://firefly.default.svc.cluster.local:8080"
              VANITY_URL: "https://firefly.${SECRET_DOMAIN}"
              CAN_POST_FILES: "true"
              CAN_POST_AUTOIMPORT: "true"
              IMPORT_DIR_ALLOWLIST: "/import"

            envFrom:
              - secretRef:
                  name: firefly-importer-secret

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes

            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi

      autoimport:
        type: cronjob
        cronjob:
          schedule: "0 1 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          backoffLimit: 0
          activeDeadlineSeconds: 14400
          restartPolicy: Never
        containers:
          curl:
            image:
              repository: docker.io/curlimages/curl
              tag: 8.11.1
            env:
              AUTO_IMPORT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: firefly-importer-secret
                    key: AUTO_IMPORT_SECRET
            command:
              - /bin/sh
              - -c
              - >-
                curl --fail --silent --show-error --request POST
                --connect-timeout 30 --max-time 14400 --keepalive-time 30
                "http://firefly-importer.default.svc.cluster.local:8080/autoimport?directory=/import&secret=$${AUTO_IMPORT_SECRET}"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    persistence:
      import:
        existingClaim: firefly-importer-import
        advancedMounts:
          firefly-importer:
            app:
              - path: /import

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: Misc
        hostnames:
          - "{{ .Release.Name }}.${LIMITED_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network

        rules:
          - backendRefs:
              - name: *app
                port: *port
