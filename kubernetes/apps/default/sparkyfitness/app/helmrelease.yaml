---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sparkyfitness
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: false
    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/codewithcj/sparkyfitness_server
              tag: v0.16.6.3
            env:
              SPARKY_FITNESS_FRONTEND_URL: "https://sparkyfitness.${LIMITED_DOMAIN}"
              SPARKY_FITNESS_DISABLE_SIGNUP: "false"
              SPARKY_FITNESS_EXTRA_TRUSTED_ORIGINS: ""
              ALLOW_PRIVATE_NETWORK_CORS: "false"
              SPARKY_FITNESS_LOG_LEVEL: info
              SPARKY_FITNESS_OIDC_AUTH_ENABLED: "true"
              SPARKY_FITNESS_OIDC_PROVIDER_SLUG: authentik
              SPARKY_FITNESS_OIDC_PROVIDER_NAME: Authentik
              SPARKY_FITNESS_OIDC_ISSUER_URL: "https://sso.${SECRET_DOMAIN}/application/o/sparky-fitness/"
              SPARKY_FITNESS_OIDC_CLIENT_ID: sparkyfitness
              SPARKY_FITNESS_OIDC_AUTO_REGISTER: "true"
              SPARKY_FITNESS_DISABLE_EMAIL_LOGIN: "false"
            envFrom: &envFrom
              - secretRef:
                  name: sparkyfitness-secret
            probes:
              liveness: {enabled: true}
              readiness: {enabled: true}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
      frontend:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/codewithcj/sparkyfitness
              tag: v0.16.6.3
            env:
              SPARKY_FITNESS_FRONTEND_URL: "https://sparkyfitness.${LIMITED_DOMAIN}"
              SPARKY_FITNESS_SERVER_HOST: sparkyfitness-server
              SPARKY_FITNESS_SERVER_PORT: "3010"
            probes:
              liveness: {enabled: true}
              readiness: {enabled: true}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
      garmin:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/codewithcj/sparkyfitness_garmin
              tag: v0.16.6.3
            env:
              GARMIN_SERVICE_PORT: "8000"
              GARMIN_MICROSERVICE_URL: http://sparkyfitness-garmin:8000
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 1Gi
    service:
      server:
        controller: server
        ports:
          http:
            port: 3010
      frontend:
        controller: frontend
        ports:
          http:
            port: &frontendPort 80
      garmin:
        controller: garmin
        ports:
          http:
            port: 8000
    route:
      app:
        hostnames:
          - "sparkyfitness.${LIMITED_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: frontend
                port: *frontendPort
    persistence:
      data:
        existingClaim: "${APP}"
        advancedMounts:
          server:
            app:
              - subPath: backup
                path: /app/SparkyFitnessServer/backup
              - subPath: uploads
                path: /app/SparkyFitnessServer/uploads
