---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emqx
spec:
  interval: 30m
  chart:
    spec:
      chart: emqx-operator
      # 2.3.1 regressed: its status reconcile unconditionally calls the
      # Enterprise-only /api/v5/load_rebalance/global_status API, which 404s on
      # open-source EMQX, aborting the reconcile before it sets the
      # apps.emqx.io/on-serving pod readiness gate. Pods then stay Ready=False,
      # drop out of the emqx-listeners Service endpoints, and clients get
      # `connect EPERM` from Cilium socket-LB (no backends). Pin to 2.3.0.
      version: 2.3.0
      sourceRef:
        kind: HelmRepository
        name: emqx
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    fullnameOverride: emqx-operator
    image:
      repository: ghcr.io/emqx/emqx-operator
