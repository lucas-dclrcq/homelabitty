---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mosquitto
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      mosquitto:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image: &img
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                cp /tmp/mosquitto/mosquitto.conf /mosquitto/config/mosquitto.conf
                mosquitto_passwd -b -c /mosquitto/config/passwd "$MQTT_USERNAME" "$MQTT_PASSWORD"
            envFrom:
              - secretRef:
                  name: mosquitto-secret
        containers:
          app:
            image: *img
            env:
              TZ: "${TIMEZONE}"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 100Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: mosquitto
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "mqtt.${LIMITED_DOMAIN}"
          io.cilium/lb-ipam-ips: "${LB_IP_EMQX}"
        ports:
          mqtt:
            port: 1883
    configMaps:
      config:
        data:
          mosquitto.conf: |-
            listener 1883
            allow_anonymous false
            password_file /mosquitto/config/passwd
            persistence true
            persistence_location /data/
            autosave_interval 60
            connection_messages true
            log_dest stdout
            log_timestamp true
    persistence:
      runtime-config:
        type: emptyDir
        globalMounts:
          - path: /mosquitto/config
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /tmp/mosquitto/mosquitto.conf
            subPath: mosquitto.conf
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-block
        globalMounts:
          - path: /data
