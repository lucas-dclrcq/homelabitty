---
apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: sloth-slo-home-wifi
  namespace: monitoring
  labels:
    prometheus: prometheus
    role: alert-rules
    app: sloth
spec:
  service: "home-wifi"
  labels:
    cluster: "valhalla"
    component: "ubiquiti"
    context: "home"
  slos:
    - name: "good-wifi-client-satisfaction"
      objective: 95
      description: "Will warn us that we don't have a good wifi at home."
      sli:
        events:
          errorQuery: sum_over_time((count(unpoller_client_satisfaction_ratio < 0.75))[{{.window}}:]) OR on() vector(0)
          totalQuery: sum_over_time((count(unpoller_client_satisfaction_ratio))[{{.window}}:])
      alerting:
        name: GoodWifiClientSatisfaction
        pageAlert:
          labels:
            severity: home
        ticketAlert:
          labels:
            severity: warning

    - name: "risk-wifi-client-satisfaction"
      objective: 99.9
      description: "Will warn us that we something very bad is happenning with our home wifi."
      sli:
        events:
          errorQuery: sum_over_time((count(unpoller_client_satisfaction_ratio < 0.5))[{{.window}}:]) OR on() vector(0)
          totalQuery: sum_over_time((count(unpoller_client_satisfaction_ratio))[{{.window}}:])
      alerting:
        name: RiskWifiClientSatisfaction
        pageAlert:
          labels:
            severity: home
        ticketAlert:
          labels:
            severity: warning
