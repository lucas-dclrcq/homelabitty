---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: blackbox-probes
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  json: >-
    {
      "annotations": { "list": [] },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Vue globale",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "count(probe_success{service=~\"$service\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Probes",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "count(probe_success{service=~\"$service\"} == 1) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Up",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "count(probe_success{service=~\"$service\"} == 0) OR vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Down",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 99 },
                  { "color": "green", "value": 99.9 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "avg(avg_over_time(probe_success{service=~\"$service\"}[24h])) * 100",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Disponibilité (24h)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "avg(probe_duration_seconds{service=~\"$service\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Durée moyenne",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "unit": "d",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 7 },
                  { "color": "green", "value": 21 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 7,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "min((probe_ssl_earliest_cert_expiry{service=~\"$service\"} - time()) / 86400)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Cert. le plus proche d'expirer",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 8,
          "title": "Probes en erreur",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 9,
          "options": {
            "showHeader": true,
            "sortBy": [ { "displayName": "instance" } ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_success{service=~\"$service\"} == 0",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Probes actuellement en erreur",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "Value": true, "__name__": true, "container": true, "endpoint": true, "pod": true, "service": true },
                "renameByName": { "instance": "Endpoint", "job": "Probe", "namespace": "Namespace" }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "max": 100,
              "min": 0,
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 99 },
                  { "color": "green", "value": 99.9 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 10,
          "options": {
            "displayMode": "basic",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": true },
            "showUnfilled": true
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "bottomk(10, avg_over_time(probe_success{service=~\"$service\"}[$__range]) * 100)",
              "instant": true,
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Disponibilité la plus faible (période affichée)",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 80, "lineWidth": 0 },
              "mappings": [
                {
                  "options": {
                    "0": { "color": "red", "index": 1, "text": "Down" },
                    "1": { "color": "green", "index": 0, "text": "Up" }
                  },
                  "type": "value"
                }
              ],
              "max": 1,
              "min": 0,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 14 },
          "id": 11,
          "maxDataPoints": 120,
          "options": {
            "colWidth": 0.9,
            "legend": { "showLegend": false },
            "rowHeight": 0.9,
            "showValue": "never",
            "tooltip": { "mode": "single" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "min by (instance) (probe_success{service=~\"$service\", instance=~\"$instance\"})",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Historique des statuts",
          "type": "status-history"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 28 },
          "id": 12,
          "title": "Détail par probe",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "État" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "options": {
                          "0": { "color": "red", "index": 1, "text": "DOWN" },
                          "1": { "color": "green", "index": 0, "text": "UP" }
                        },
                        "type": "value"
                      }
                    ]
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Durée" },
                "properties": [ { "id": "unit", "value": "s" }, { "id": "decimals", "value": 3 } ]
              },
              {
                "matcher": { "id": "byName", "options": "Cert. expire dans" },
                "properties": [
                  { "id": "unit", "value": "d" },
                  { "id": "decimals", "value": 0 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "orange", "value": 7 },
                        { "color": "green", "value": 21 }
                      ]
                    }
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-text" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 29 },
          "id": 13,
          "options": {
            "showHeader": true,
            "sortBy": [ { "displayName": "État" } ]
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_success{service=~\"$service\", instance=~\"$instance\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_http_status_code{service=~\"$service\", instance=~\"$instance\"}",
              "format": "table",
              "instant": true,
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_duration_seconds{service=~\"$service\", instance=~\"$instance\"}",
              "format": "table",
              "instant": true,
              "refId": "C"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "(probe_ssl_earliest_cert_expiry{service=~\"$service\", instance=~\"$instance\"} - time()) / 86400",
              "format": "table",
              "instant": true,
              "refId": "D"
            }
          ],
          "title": "État courant de chaque probe",
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "__name__": true, "container": true, "endpoint": true, "pod": true, "service": true },
                "renameByName": {
                  "Value #A": "État",
                  "Value #B": "Code HTTP",
                  "Value #C": "Durée",
                  "Value #D": "Cert. expire dans",
                  "instance": "Endpoint",
                  "job": "Probe",
                  "namespace": "Namespace"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 5, "showPoints": "never" },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 39 },
          "id": 14,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_duration_seconds{service=~\"$service\", instance=~\"$instance\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Durée de la probe",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 10, "showPoints": "never", "stacking": { "mode": "normal" } },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 39 },
          "id": 15,
          "options": {
            "legend": { "calcs": ["mean"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "avg by (phase) (probe_http_duration_seconds{service=~\"$service\", instance=~\"$instance\"})",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ],
          "title": "Phases HTTP (moyenne des probes sélectionnées)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 0, "showPoints": "never" },
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 48 },
          "id": 16,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_http_status_code{service=~\"$service\", instance=~\"$instance\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Code HTTP",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 5, "showPoints": "never" },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 48 },
          "id": 17,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "probe_dns_lookup_time_seconds{service=~\"$service\", instance=~\"$instance\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Temps de résolution DNS",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 0, "showPoints": "never" },
              "decimals": 0,
              "unit": "d",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 7 },
                  { "color": "green", "value": 21 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 48 },
          "id": 18,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "asc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "(probe_ssl_earliest_cert_expiry{service=~\"$service\", instance=~\"$instance\"} - time()) / 86400",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Expiration des certificats",
          "type": "timeseries"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["blackbox", "probes", "uptime"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "prometheus" },
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "app-endpoint", "value": "app-endpoint" },
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "definition": "label_values(probe_success, service)",
            "hide": 0,
            "includeAll": true,
            "multi": false,
            "name": "service",
            "options": [],
            "query": { "qryType": 1, "query": "label_values(probe_success, service)", "refId": "PrometheusVariableQueryEditor-VariableQuery" },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": { "selected": true, "text": ["All"], "value": ["$__all"] },
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "definition": "label_values(probe_success{service=~\"$service\"}, instance)",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "instance",
            "options": [],
            "query": { "qryType": 1, "query": "label_values(probe_success{service=~\"$service\"}, instance)", "refId": "PrometheusVariableQueryEditor-VariableQuery" },
            "refresh": 2,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "timezone": "browser",
      "title": "Blackbox Probes",
      "uid": "blackbox-probes"
    }
