---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sloth
spec:
  interval: 1h
  chart:
    spec:
      chart: sloth
      version: 0.15.0
      sourceRef:
        kind: HelmRepository
        name: sloth
        namespace: flux-system
  values:
    commonPlugins:
      enabled: true
    metrics:
      enabled: true
