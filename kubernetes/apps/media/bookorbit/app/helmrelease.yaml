---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bookorbit
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      bookorbit:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/bookorbit/bookorbit
              tag: 2.3.0@sha256:62048532c82ad4cfe9b728707136f140516f0f35766c2dc97969f22ed67794ae

            env:
              TZ: ${TIMEZONE}
              NODE_ENV: production
              PORT: &port 3000
              APP_URL: https://bookorbit.${SECRET_DOMAIN}
              LIBRARY_BROWSE_ROOT: /books
              # Kubernetes manages volume ownership via fsGroup
              BOOKORBIT_FIX_PERMISSIONS: "false"
              # in-cluster, sso.${SECRET_DOMAIN} resolves to the private gateway IP
              OIDC_ALLOW_LOCAL_ISSUERS: "true"
              NODE_MAX_OLD_SPACE_SIZE: "1536"

            envFrom:
              - secretRef:
                  name: bookorbit-secret

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: "${APP_UID}"
        runAsGroup: "${APP_GID}"
        fsGroup: "${APP_GID}"
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          homelab-manager.hoohoot.org/enabled: "true"
          homelab-manager.hoohoot.org/category: "Media"
          homelab-manager.hoohoot.org/description: "Bibliothèque numérique — ebooks, BD et livres audio, synchronisation multi-appareils"
          homelab-manager.hoohoot.org/logo-url: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/bookorbit.png"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network

        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data

      books:
        type: nfs
        server: "truenas.${INTERNAL_DOMAIN}"
        path: /mnt/tank/Apps/bookorbit
        globalMounts:
          - path: /books

      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
