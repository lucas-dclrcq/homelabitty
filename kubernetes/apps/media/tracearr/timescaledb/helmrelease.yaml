---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tracearr-timescaledb
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      tracearr-timescaledb:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: timescale/timescaledb-ha
              tag: pg18.1-ts2.25.0

            # Mirrors the upstream docker-compose.pg18.yml command
            args:
              - postgres
              - -c
              - timescaledb.license=timescale
              - -c
              - timescaledb.max_tuples_decompressed_per_dml_transaction=0
              - -c
              - max_locks_per_transaction=4096
              - -c
              - timescaledb.telemetry_level=off

            env:
              TZ: ${TIMEZONE}
              POSTGRES_DB: &db tracearr
              POSTGRES_USER: *db
              PGDATA: /home/postgres/pgdata/data

            envFrom:
              - secretRef:
                  name: tracearr-timescaledb-secret

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 5432
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready", "-U", *db, "-d", *db]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      app:
        controller: *app
        ports:
          postgres:
            port: *port

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /home/postgres/pgdata
