---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr-anime
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: hashicorp-vault
  target:
    name: sonarr-anime-secret
    template:
      engineVersion: v2
      data:
        SONARR__AUTH__APIKEY: "{{ .SONARR__AUTH__APIKEY }}"
        PUSHOVER_TOKEN: "{{ .SONARR_PUSHOVER_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
        SONARR__POSTGRES__USER: "{{ .pg_user }}"
        SONARR__POSTGRES__PASSWORD: "{{ .pg_password }}"
  dataFrom:
    # SONARR_PUSHOVER_TOKEN is shared with the main sonarr instance.
    # downloads/sonarr-anime is extracted last so its SONARR__AUTH__APIKEY
    # wins over the main instance's key.
    - extract:
        key: media/sonarr/config
    - extract:
        key: cloud/pushover
    - extract:
        key: downloads/sonarr-anime
    - extract:
        key: postgres-16-pguser-sonarranime
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: crunchy-pgo-secrets
      rewrite:
        - regexp:
            source: "(.*)"
            target: "pg_$1"
