---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: hashicorp-vault
  target:
    name: recyclarr-secret
    template:
      engineVersion: v2
      data:
        RADARR_API_KEY: "{{ .RADARR__AUTH__APIKEY }}"
        SONARR_API_KEY: "{{ .SONARR__AUTH__APIKEY }}"
        SONARR_ANIME_API_KEY: "{{ .SONARR_ANIME_APIKEY }}"
  data:
    - secretKey: SONARR_ANIME_APIKEY
      remoteRef:
        key: downloads/sonarr-anime
        property: SONARR__AUTH__APIKEY
  dataFrom:
    - extract:
        key: downloads/radarr
    - extract:
        key: media/sonarr/config
