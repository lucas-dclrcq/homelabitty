---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
sonarr:
  sonarr:
    base_url: http://sonarr.downloads.svc.cluster.local
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: series
    # Guide-backed quality profiles (v8) — replaces the removed official
    # include templates. `name` is kept so the existing profiles are adopted
    # and keep their current names in Sonarr.
    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
        name: WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
      - trash_id: 4c48f506c1116a3a57ae33f12346bd15 # [French MULTi.VO] HD Bluray + WEB (1080p)
        name: FR-MULTi-VO-WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
      - trash_id: 58e8dc75731040612dd6f4ac0676bfd7 # [French MULTi.VF] HD Bluray + WEB (1080p)
        name: FR-MULTi-VF-WEB-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
    custom_formats:
      # Optional
      - trash_ids:
          # Unwanted
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
        assign_scores_to:
          - name: WEB-1080p
          - name: FR-MULTi-VO-WEB-1080p
      # Allow x265 HD releases with HDR/DV
      - trash_ids:
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: WEB-1080p
            score: 0
          - name: FR-MULTi-VO-WEB-1080p
            score: 0
          - name: FR-MULTi-VF-WEB-1080p
            score: 0
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: WEB-1080p
          - name: FR-MULTi-VO-WEB-1080p
          - name: FR-MULTi-VF-WEB-1080p
      # Block FanSUB
      - trash_ids:
          - 84f0acbda9c0c9de783894fb66df25aa # FanSUB
        assign_scores_to:
          - name: FR-MULTi-VO-WEB-1080p
            score: -10000
          - name: FR-MULTi-VF-WEB-1080p
            score: -10000
      # French preferences (101 for preferred, 0 or -101 for others)
      - trash_ids:
          - 2c29a39a4fdfd6d258799bc4c09731b9 # VFF
          - 7ae924ee9b2f39df3283c6c0beb8a2aa # VOF
          - b6816a0e1d4b64bf3550ad3b74b009b6 # VFI
          - 34789ec3caa819f087e23bbf9999daf7 # VF2
        assign_scores_to:
          - name: FR-MULTi-VO-WEB-1080p
            score: 101
          - name: FR-MULTi-VF-WEB-1080p
            score: 101
      - trash_ids:
          - 7a7f4e4f58bd1058440236d033a90b67 # VFQ
          - 802dd70b856c423a9b0cb7f34ac42be1 # VOQ
          - 82085412d9a53ba8d8e46fc624eb701d # VQ
          - 0ce1e39a4676c6692ce47935278dac76 # VFB
        assign_scores_to:
          - name: FR-MULTi-VO-WEB-1080p
            score: 0
          - name: FR-MULTi-VF-WEB-1080p
            score: 0
      - trash_ids:
          - ae575f95ab639ba5d15f663bf019e3e8 # Language: Not Original
        assign_scores_to:
          - name: WEB-1080p
            score: -10000
  # Dedicated anime instance: anime quality definition (wide-open size
  # limits) + anime-oriented profiles, kept apart from the regular series
  # instance whose quality definition is strict.
  sonarr-anime:
    base_url: http://sonarr-anime.downloads.svc.cluster.local
    api_key: !env_var SONARR_ANIME_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: anime
    quality_profiles:
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true
      # No guide-backed equivalent exists for the French anime VOSTFR profile
      # (dropped from TRaSH guides / v8 templates). Inlined from the old
      # sonarr-v4-quality-profile-1080p-french-anime-vostfr template.
      - name: FR-ANIME-VOSTFR
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: false
        min_format_score: 100
        score_set: french-anime-vostfr
        quality_sort: top
        qualities:
          - name: Bluray-1080p
            qualities:
              - Bluray-1080p Remux
              - Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
              - HDTV-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
              - HDTV-720p
          - name: Bluray-480p
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: DVD
          - name: SDTV
    custom_formats:
      - trash_ids:
          - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
          - b2550eb333d27b75833e25b8c2557b38 # 10bit
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: "[Anime] Remux-1080p"
            score: 0
          - name: FR-ANIME-VOSTFR
