---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app droppedneedle
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  maxHistory: 3
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      droppedneedle:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/habirabbu/droppedneedle
              tag: v2.3.0@sha256:2a64f2cad5e531efb4895df08aec08123e5aa7215658a1a57109bd66588941b6

            env:
              TZ: ${TIMEZONE}
              PUID: "${APP_UID}"
              PGID: "${APP_GID}"
              PORT: &port 8688
              SLSKD_DOWNLOADS_PATH: /media/Downloads/nicotine/complete

            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 4Gi

            probes:
              # The /health endpoint becomes unresponsive during the (long) library
              # scan since the app blocks its worker while scanning tens of thousands
              # of tracks. Keep probes tolerant so the scan is not interrupted (which
              # otherwise SIGTERMs the pod mid-scan and CrashLoopBackOffs it).
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          homelab-manager.hoohoot.org/enabled: "true"
          homelab-manager.hoohoot.org/category: "Media"
          homelab-manager.hoohoot.org/description: "Téléchargement de musique"
          homelab-manager.hoohoot.org/logo-url: "https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/droppedneedle.png"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network

        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/config
            subPath: config
          - path: /app/cache
            subPath: cache
      tmp:
        type: emptyDir
      media:
        type: nfs
        server: "truenas.${INTERNAL_DOMAIN}"
        path: /mnt/tank/Media
        globalMounts:
          - path: /media
