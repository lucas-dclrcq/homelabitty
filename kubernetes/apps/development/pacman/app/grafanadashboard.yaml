                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "ÉCHEC",
                      "color": "red"
                    },
                    "1": {
                      "text": "OK",
                      "color": "green"
                    }
                  }
                }
              ]
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 42
