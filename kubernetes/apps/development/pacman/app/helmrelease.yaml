---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pacman
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      pacman:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          nginx:
            image:
              repository: docker.io/nginxinc/nginx-unprivileged
              tag: 1.31-alpine
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
      sync:
        type: cronjob
        cronjob:
          schedule: "*/30 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 5
          failedJobsHistory: 5
          backoffLimit: 0
        containers:
          rsync:
            image:
              repository: docker.io/eeacms/rsync
              tag: "3.0"
            command:
              - /bin/sh
              - -c
            args:
              - |
                set -u
                PUSHGW="http://prometheus-pushgateway.observability.svc.cluster.local:9091/metrics/job/pacman-sync"
                LOG=/tmp/rsync.log
                START=$(date +%s)

                rsync -rtlvH --safe-links --delete-after --delete-excluded \
                  --delay-updates --no-motd --stats --itemize-changes \
                  --timeout=600 --contimeout=60 \
                  --exclude='iso/' --exclude='*-debug/' --exclude='sources/' \
                  rsync://ftp.halifax.rwth-aachen.de/archlinux/ /srv/repo/ >"$LOG" 2>&1
                RC=$?
                cat "$LOG"

                # rsync exit 24 = "some files vanished before they could be
                # transferred"; expected when mirroring an actively-updating
                # upstream repo. Treat as success.
                if [ "$RC" -eq 24 ]; then
                  echo "rsync exit 24 (vanished source files) treated as success"
                  RC=0
                fi

                END=$(date +%s)
                [ "$RC" -eq 0 ] && SUCCESS=1 || SUCCESS=0

                parse_num() { grep -E "^$1:" "$LOG" | head -1 | sed -E 's/[^0-9]*([0-9,]+).*/\1/' | tr -d ','; }
                FILES=$(parse_num 'Number of regular files transferred'); FILES=${FILES:-0}
                DELETED=$(parse_num 'Number of deleted files'); DELETED=${DELETED:-0}
                BYTES=$(parse_num 'Total transferred file size'); BYTES=${BYTES:-0}
                RECEIVED=$(parse_num 'Total bytes received'); RECEIVED=${RECEIVED:-0}

                cat <<EOF | curl -sf --max-time 30 --data-binary @- "$PUSHGW" || echo "pushgateway push failed"
                # TYPE pacman_sync_success gauge
                pacman_sync_success $SUCCESS
                # TYPE pacman_sync_duration_seconds gauge
                pacman_sync_duration_seconds $((END - START))
                # TYPE pacman_sync_files_transferred gauge
                pacman_sync_files_transferred $FILES
                # TYPE pacman_sync_files_deleted gauge
                pacman_sync_files_deleted $DELETED
                # TYPE pacman_sync_bytes_transferred gauge
                pacman_sync_bytes_transferred $BYTES
                # TYPE pacman_sync_bytes_received gauge
                pacman_sync_bytes_received $RECEIVED
                EOF

                exit $RC
            securityContext:
              runAsUser: 0
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi

    service:
      app:
        controller: pacman
        ports:
          http:
            port: &port 8080

    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: Misc
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      repo:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        size: 150Gi
        storageClass: ceph-filesystem
        advancedMounts:
          pacman:
            nginx:
              - path: /srv/repo
          sync:
            rsync:
              - path: /srv/repo
      nginx-config:
        type: configMap
        identifier: config
        advancedMounts:
          pacman:
            nginx:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true

    configMaps:
      config:
        data:
          default.conf: |-
            server {
              listen 8080;
              server_name _;
              root /srv/repo;
              location / {
                autoindex on;
                autoindex_exact_size off;
              }
            }
