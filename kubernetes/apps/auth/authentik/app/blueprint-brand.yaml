---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-brand
  labels:
    app.kubernetes.io/component: blueprint
data:
  hoohoot-brand.yaml: |
    version: 1
    metadata:
      name: hoohoot-brand-styling
      labels:
        blueprints.goauthentik.io/description: "Hoohoot login branding & theme"
    entries:
      - model: authentik_brands.brand
        identifiers:
          domain: authentik-default
        attrs:
          branding_title: "hoohoot"
          branding_logo: "data:image/svg+xml;base64,"
          branding_favicon: "data:image/svg+xml;base64,"
          branding_default_flow_background: "data:image/svg+xml;base64,"
          branding_custom_css: |
            /* ===== Hoohoot — Authentik login theme ====================
               Cosy, warm, light-first. Baloo 2 (display) + Nunito (body).
               ========================================================= */
            @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap");

            :root, :host {
              --ak-accent: #E8973A;
              --pf-global--primary-color--100: #E8973A;
              --pf-global--primary-color--200: #C87C1F;
              --pf-global--active-color--100: #E8973A;
              --pf-global--link--Color: #5D5AA6;
              --pf-global--link--Color--hover: #49468C;
              --pf-global--Color--100: #2E2933;
              --pf-global--Color--200: #5C5566;
              --pf-global--BackgroundColor--100: #FFFDFA;
              --pf-global--BorderColor--100: #ECE4D8;
              --pf-global--FontFamily--sans-serif: "Nunito", system-ui, -apple-system, "Segoe UI", sans-serif;
              --pf-global--FontFamily--heading--sans-serif: "Baloo 2", "Trebuchet MS", "Segoe UI", sans-serif;
              --pf-global--FontFamily--redhatfont--sans-serif: "Nunito", system-ui, sans-serif;
              --pf-global--BorderRadius--sm: 12px;
              --pf-global--BorderRadius--lg: 18px;
            }

            /* Page background fallback (branding bg handles the gradient) */
            .pf-c-background-image { background-color: #FBF7F0; }

            /* Login card */
            .pf-c-login__main {
              background-color: #FFFDFA;
              border: 1.5px solid #ECE4D8;
              border-radius: 26px;
              box-shadow: 0 16px 38px rgba(46,41,51,0.11), 0 5px 12px rgba(46,41,51,0.06);
              overflow: hidden;
            }
            .pf-c-login__main-header,
            .pf-c-login__main-body,
            .pf-c-login__main-footer { background-color: transparent; }

            /* Titles */
            .pf-c-login__main-header .pf-c-title,
            .pf-c-title {
              font-family: "Baloo 2", "Trebuchet MS", sans-serif;
              font-weight: 800;
              color: #2E2933;
              letter-spacing: -0.01em;
            }

            /* Labels / helper text */
            .pf-c-form__label-text { color: #5C5566; font-weight: 700; }
            .pf-c-form__helper-text { color: #A79E92; }

            /* Inputs */
            .pf-c-form-control {
              background-color: #FFFFFF;
              border: 1.5px solid #ECE4D8;
              border-radius: 12px;
              color: #2E2933;
              padding: 10px 14px;
            }
            .pf-c-form-control:hover { border-color: #E8973A; }
            .pf-c-form-control:focus {
              border-color: #E8973A;
              outline: none;
              box-shadow: 0 0 0 3px rgba(232,151,58,0.45);
            }

            /* Primary button — amber, ink text, pill */
            .pf-c-button.pf-m-primary {
              background-color: #E8973A;
              color: #2E2933;
              font-family: "Baloo 2", "Trebuchet MS", sans-serif;
              font-weight: 700;
              border: none;
              border-radius: 999px;
              box-shadow: 0 3px 10px rgba(46,41,51,0.07);
            }
            .pf-c-button.pf-m-primary:hover,
            .pf-c-button.pf-m-primary:focus {
              background-color: #C87C1F;
              color: #2E2933;
              box-shadow: 0 0 0 3px rgba(232,151,58,0.45);
            }

            /* Link buttons & anchors — dusk indigo */
            .pf-c-button.pf-m-link,
            .pf-c-login__main-footer-links-item a,
            a { color: #5D5AA6; }
            .pf-c-button.pf-m-link:hover,
            a:hover { color: #49468C; }

            /* Checkboxes */
            .pf-c-check__input { accent-color: #E8973A; }

            /* Logo sizing */
            .pf-c-brand { max-height: 72px; }
