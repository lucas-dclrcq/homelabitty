---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: home-assistant
spec:
  interval: 1m
  module: http_2xx
  prober:
    url: blackbox-exporter-lan.observability.svc.cluster.local.:9115
  targets:
    staticConfig:
      static:
        - "https://home-assistant.${SECRET_DOMAIN}"
        - "https://hass.${SECRET_DOMAIN}"
  metricRelabelings:
    - targetLabel: service
      replacement: app-endpoint
      action: replace
