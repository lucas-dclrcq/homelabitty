---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-snapshot
  namespace: vault
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-snapshot
  namespace: vault
  labels:
    app.kubernetes.io/component: snapshot
spec:
  # Every 6h. Tune freely; Vault data changes rarely in a homelab.
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/component: snapshot
        spec:
          serviceAccountName: vault-snapshot
          restartPolicy: OnFailure
          securityContext:
            runAsUser: ${APP_UID}
            runAsGroup: ${APP_GID}
            fsGroup: ${APP_GID}
          containers:
            - name: snapshot
              image: docker.io/hashicorp/vault:2.0.3
              env:
                - name: VAULT_ADDR
                  value: http://vault-active.vault.svc.cluster.local:8200
                - name: VAULT_K8S_ROLE
                  value: vault-snapshot
                - name: SNAP_DIR
                  value: /snapshots
                - name: KEEP
                  value: "28"
              command:
                - /bin/sh
                - -ec
                - |
                  TS="$(date +%Y%m%d-%H%M%S)"
                  TARGET="$${SNAP_DIR}/vault-$${TS}.snap"

                  echo "Authenticating to Vault (k8s auth, role=$${VAULT_K8S_ROLE})..."
                  VAULT_TOKEN="$(vault write -field=token auth/kubernetes/login \
                    role="$${VAULT_K8S_ROLE}" \
                    jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")"
                  export VAULT_TOKEN

                  echo "Saving raft snapshot to $${TARGET}..."
                  vault operator raft snapshot save "$${TARGET}"

                  if [ ! -s "$${TARGET}" ]; then
                    echo "ERROR: snapshot file is empty" >&2
                    rm -f "$${TARGET}"
                    exit 1
                  fi
                  echo "Snapshot OK ($(ls -lh "$${TARGET}" | awk '{print $5}'))"

                  echo "Pruning, keeping last $${KEEP}..."
                  ls -1t "$${SNAP_DIR}"/vault-*.snap | tail -n "+$((KEEP + 1))" | while read -r f; do
                    echo "  removing $${f}"
                    rm -f "$${f}"
                  done
                  echo "Done."
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
          volumes:
            - name: snapshots
              nfs:
                server: truenas.${INTERNAL_DOMAIN}
                path: /mnt/tank/Backup/vault
