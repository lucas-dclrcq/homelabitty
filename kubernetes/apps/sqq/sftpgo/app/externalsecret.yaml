---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sftpgo-sqq
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: sftpgo-sqq-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # ADMIN
        SFTPGO_DEFAULT_ADMIN_USERNAME: "{{ .ADMIN_USERNAME }}"
        SFTPGO_DEFAULT_ADMIN_PASSWORD: "{{ .ADMIN_PASSWORD }}"
        # DATA PROVIDER
        SFTPGO_DATA_PROVIDER__DRIVER: postgresql
        SFTPGO_DATA_PROVIDER__NAME: "{{ .pg_dbname }}"
        SFTPGO_DATA_PROVIDER__HOST: "{{ .pg_host }}"
        SFTPGO_DATA_PROVIDER__PORT: "{{ .pg_port }}"
        SFTPGO_DATA_PROVIDER__USERNAME: "{{ .pg_user }}"
        SFTPGO_DATA_PROVIDER__PASSWORD: "{{ .pg_password }}"
        SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN: "true"
        # TELEMETRY
        SFTPGO_TELEMETRY__BIND_ADDRESS: 0.0.0.0
        SFTPGO_TELEMETRY__BIND_PORT: "8081"
        ## SFTP
        SFTPGO_SFTPD__BINDINGS__0__ADDRESS: 0.0.0.0
        SFTPGO_SFTPD__BINDINGS__0__PORT: "2022"
        ## HTTP
        SFTPGO_HTTPD__BINDINGS__0__ADDRESS: 0.0.0.0
        SFTPGO_HTTPD__BINDINGS__0__PORT: "8080"
  dataFrom:
    - extract:
        key: sqq/sftpgo
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: postgres-sqq-pguser-sftpgo
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: crunchy-pgo-sqq-secrets
      rewrite:
        - regexp:
            source: "(.*)"
            target: "pg_$1"
