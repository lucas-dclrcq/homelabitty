---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scannettes
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: hashicorp-vault
  target:
    name: scannettes-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Env vars consumed via envFrom and resolved by scannettes/tools/parsers.py:map_env
        # against the ${VAR} placeholders inside scannettes_config.yaml.
        ERP_URL: "{{ .ERP_URL }}"
        ERP_DB: "{{ .ERP_DB }}"
        ERP_USERNAME: "{{ .ERP_USERNAME }}"
        ERP_PASSWORD: "{{ .ERP_PASSWORD }}"
        FLASK_SECRET_KEY: "{{ .FLASK_SECRET_KEY }}"
        AUTH_SECRET_KEY: "{{ .AUTH_SECRET_KEY }}"
        AUTH_SALT: "{{ .AUTH_SALT }}"

        # Mounted as /application/scannettes_configs/secrets.yaml
        secrets.yaml: |
          users:
            admin:
              username: admin
              password: "{{ .ADMIN_PASSWORD_SHA256 }}"
              authorizations:
                - admin
  dataFrom:
    - extract:
        key: apps/sqq/scannettes
