---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sqq-vente-groupee
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: sqq-vente-groupee-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        STRIPE_API_KEY: "{{ .STRIPE_API_KEY }}"
        STRIPE_WEBHOOK_SECRET: "{{ .STRIPE_WEBHOOK_SECRET }}"
        QUARKUS_DATASOURCE_JDBC_URL: '{{ index . "jdbc-uri" }}'
        QUARKUS_OIDC_AUTH_SERVER_URL: https://sso.${SECRET_DOMAIN}/application/o/sqq-vente-groupee/
        QUARKUS_OIDC_CLIENT_ID: "{{ .CLIENT_ID }}"
        QUARKUS_OIDC_CREDENTIALS_SECRET: "{{ .CLIENT_SECRET }}"
        QUARKUS_OIDC_AUTHENTICATION_FORCE_REDIRECT_HTTPS_SCHEME: "true"
        QUARKUS_OIDC_AUTHENTICATION_PKCE_REQUIRED: "true"
        QUARKUS_OIDC_AUTHENTICATION_REDIRECT_PATH: "/admin"
        QUARKUS_HTTP_CORS_ENABLED: "true"
        QUARKUS_HTTP_CORS_ORIGINS: "https://vente-groupee.${SQQ_DOMAIN},https://sso.{SECRET_DOMAIN}"
        APP_BASE_URL: "https://vente-groupee.${SQQ_DOMAIN}"
  dataFrom:
    - extract:
        key: sqq/sqq-vente-groupee
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: hashicorp-vault
    - extract:
        key: postgres-sqq-pguser-sqqvgprod
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: crunchy-pgo-sqq-secrets
